<body>
  
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Esport Manager</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

                                                                     <!-- HERO SECTION (titre centré) -->
<section class="hero">                                                 
  <h1 class="main-title">ESPORT MANAGER</h1>
</section>



<!-- TOURNAMENTS -->
<section class="tournaments">
  <!-- Championnat -->
  <div class="tournament">
    <div class="tournament-info">
      <h2>League / Championship 📅 </h2>
      <p>Create a full league with standings,
        promotions and relegations.</p>
      <button class="start-btn">Start Tournament</button>
    </div>
  </div>



  
  <!-- Swiss Stage + Playoffs -->
  <div class="tournament">
    <div class="tournament-info">
      <h2>Swiss Stage + Playoffs 🏆</h2>
      <p>Teams compete in Swiss groups.
        The best teams qualify for the playoffs with Upper and Lower brackets.</p>
      <button class="start-btn">Start Tournament</button>
    </div>
  </div>
</section>

</body>
